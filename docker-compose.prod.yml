services:
  tourism-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:-}
        NEXT_PUBLIC_APP_PORT: ${NEXT_PUBLIC_APP_PORT:-3001}
        NEXT_PUBLIC_API_ORIGIN: ${NEXT_PUBLIC_API_ORIGIN:-}
        NEXT_PUBLIC_RESERVED_SUBDOMAINS: ${NEXT_PUBLIC_RESERVED_SUBDOMAINS:-www,api}
        PLATFORM_ROOT_DOMAIN: ${PLATFORM_ROOT_DOMAIN:-}
        INTERNAL_API_ORIGIN: ${INTERNAL_API_ORIGIN:-}
    image: tourism-app:prod
    container_name: tourism-app
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    expose:
      - "3000"
    networks:
      - tourismnet

  nginx:
    image: nginx:1.27-alpine
    container_name: tourism-app-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - tourism-app
    networks:
      - tourismnet

networks:
  tourismnet:
    driver: bridge
